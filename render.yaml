services:
  - type: web
    name: finchwire-app
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free # Note: free tier does not support persistent disks. For persistent state, upgrade to Starter.
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: FINCHWIRE_STATE_FILE
        value: /data/finchwire_state.json
      - key: FINCHWIRE_MEDIA_DIR
        value: /data/media
      - key: FINCHWIRE_ADMIN_PASSWORD
        generateValue: true
      - key: FINCHWIRE_SECRET_KEY
        generateValue: true
      - key: YT_DOWNLOAD_URL
        # This points to the sibling microservice or localhost if merged
        value: http://localhost:3000
      - key: FINCHWIRE_PUBLIC_BASE_URL
        value: https://finchwire-app.onrender.com
    healthCheckPath: /api/health
